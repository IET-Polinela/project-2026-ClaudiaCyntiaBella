<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(120deg,#667eea,#764ba2);
    color:white;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px 80px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

.logo{
    font-weight:bold;
    font-size:20px;
}

.nav-links a{
    margin-left:25px;
    color:white;
    text-decoration:none;
    font-weight:500;
}

/* Hero section */

.hero{
    text-align:center;
    margin-top:120px;
    animation:fadeIn 2s ease;
}

.hero h1{
    font-size:50px;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    opacity:0.9;
}

/* button */

.btn{
    margin-top:30px;
    display:inline-block;
    padding:12px 28px;
    background:white;
    color:#333;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
}

/* animation */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo"> Bandar Lampung</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/about/">About</a>
<a href="/contacts/">Contacts</a>
</div>

</div>

<div class="hero">

<h1>Selamat Datang di Website Saya</h1>

<p>
Website ini dibuat menggunakan Django Framework.
</p>

<a class="btn" href="/about/">Explore Website</a>

</div>

</body>
</html>
