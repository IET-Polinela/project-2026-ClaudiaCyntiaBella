<!DOCTYPE html>
<html>
<head>
<title>Contacts</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(120deg,#ff9a9e,#fad0c4);
    color:white;
}

/* Navbar */

.navbar{
    display:flex;
    justify-content:space-between;
    padding:20px 80px;
    background:rgba(255,255,255,0.1);
}

.logo{
    font-weight:bold;
}

.nav-links a{
    margin-left:25px;
    color:white;
    text-decoration:none;
    font-weight:500;
}

/* Container */

.container{
    text-align:center;
    margin-top:100px;
}

/* Contact Card */

.contact-card{
    background:white;
    color:#333;
    width:420px;
    margin:auto;
    padding:35px;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
    animation:fadeIn 1.5s ease;
}

.contact-card h2{
    margin-bottom:25px;
}

/* Contact item */

.contact-item{
    margin:15px 0;
    font-size:18px;
}

/* Instagram button */

.ig-link{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    border-radius:25px;
    background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.ig-link:hover{
    transform:scale(1.1);
}

/* animation */

@keyframes fadeIn{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">📞 Contacts</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/about/">About</a>
<a href="/contacts/">Contacts</a>
</div>

</div>

<div class="container">

<div class="contact-card">

<h2>Hubungi Saya</h2>

<div class="contact-item">
📧 Email : mahasiswapolinela@email.com
</div>

<div class="contact-item">
📸 Instagram
</div>

<a class="ig-link"
href="https://www.instagram.com/claudiajih_?igsh=eXVtNGtvMXJ3Mm5q"
target="_blank">
@claudiajih_
</a>

<div class="contact-item">
</div>

</div>

</div>

</body>
</html>
