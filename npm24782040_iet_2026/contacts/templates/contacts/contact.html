{% extends 'base.html' %}

{% block title %}Contact{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">Contact</li>
    </ol>
</nav>

<div class="card page-card">
    <div class="card-body p-4 p-md-5">
        <h1 class="section-title mb-3">Contact</h1>
        <p class="subtle-text mb-4">Halaman ini berisi informasi kontak pengelola aplikasi Malang City.</p>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="p-4 rounded-4 soft-box h-100">
                    <i class="bi bi-envelope-fill text-primary fs-3"></i>
                    <h5 class="mt-3 fw-bold">Email</h5>
                    <p class="subtle-text mb-0">malangcity@example.com</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="p-4 rounded-4 soft-box h-100">
                    <i class="bi bi-telephone-fill text-primary fs-3"></i>
                    <h5 class="mt-3 fw-bold">Telepon</h5>
                    <p class="subtle-text mb-0">+62 812 3456 7890</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="p-4 rounded-4 soft-box h-100">
                    <i class="bi bi-geo-alt-fill text-primary fs-3"></i>
                    <h5 class="mt-3 fw-bold">Alamat</h5>
                    <p class="subtle-text mb-0">Malang, Indonesia</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
