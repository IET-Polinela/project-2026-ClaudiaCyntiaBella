<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, #dbeafe 0, transparent 35%),
                linear-gradient(135deg, #eff6ff 0%, #f8fbff 55%, #eaf4ff 100%);
            color: #1f2937;
        }

        .navbar-custom {
            background: linear-gradient(90deg, #2563eb, #60a5fa);
            border-bottom: 1px solid rgba(255,255,255,0.25);
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(255,255,255,0.18);
        }

        .glass-card {
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(147,197,253,0.35);
            border-radius: 22px;
            box-shadow: 0 18px 45px rgba(37,99,235,0.12);
            transition: 0.25s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 55px rgba(37,99,235,0.18);
        }

        .soft-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #dbeafe;
            color: #2563eb;
            font-size: 1.4rem;
        }

        .btn-soft-primary {
            background: linear-gradient(135deg, #2563eb, #60a5fa);
            border: none;
            color: white;
            box-shadow: 0 10px 24px rgba(37,99,235,0.25);
        }

        .btn-soft-primary:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(37,99,235,0.35);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        .stat-card {
            transition: 0.25s ease;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 35px rgba(37,99,235,0.16) !important;
        }

        .timeline-step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 14px;
            background: #eff6ff;
            margin-bottom: 10px;
        }

        .timeline-step i {
            color: #2563eb;
        }

        .spa-container {
            min-height: calc(100vh - 85px);
        }

        .progress {
            height: 8px;
            border-radius: 20px;
            background-color: #e5e7eb;
        }

        .report-card {
            border-radius: 18px;
            border: 1px solid rgba(147,197,253,0.25);
            transition: 0.25s ease;
        }


        .report-grid-card {
            min-height: 260px;
            border-radius: 24px;
            background: rgba(255,255,255,0.95);
            border: 1px solid rgba(147,197,253,0.35);
            box-shadow: 0 16px 38px rgba(37,99,235,0.12);
            transition: 0.28s ease;
            position: relative;
            overflow: hidden;
        }

        .report-grid-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 55px rgba(37,99,235,0.22);
        }

        .report-grid-card::before {
            content: "";
            position: absolute;
            top: -45px;
            right: -45px;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(96,165,250,0.18);
        }

        .report-status-icon {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #dbeafe;
            color: #2563eb;
            font-size: 1.5rem;
        }

        .report-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(37,99,235,0.12);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-custom shadow-sm">
    <div class="container-fluid px-4 py-2">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">
            <span class="brand-icon">
                <i class="bi bi-buildings-fill"></i>
            </span>
            Smart City Portal
        </a>

        <div id="nav-menu" class="ms-auto"></div>
    </div>
</nav>

<main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

<div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="reportModalLabel">
                    <i class="bi bi-file-earmark-plus-fill text-primary me-1"></i>
                    Form Laporan
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <form id="reportForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Judul Laporan</label>
                        <input type="text" class="form-control" id="reportTitle" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Kategori</label>
                        <input type="text" class="form-control" id="reportCategory" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Lokasi</label>
                        <input type="text" class="form-control" id="reportLocation" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Deskripsi</label>
                        <textarea class="form-control" id="reportDescription" rows="4" required></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline-primary w-50" id="saveDraftBtn">
                            <i class="bi bi-save-fill me-1"></i>
                            Simpan Draft
                        </button>

                        <button type="button" class="btn btn-soft-primary w-50" id="submitReportBtn">
                            <i class="bi bi-send-fill me-1"></i>
                            Ajukan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/router.js"></script>

</body>
</html>
