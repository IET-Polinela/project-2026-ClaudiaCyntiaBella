{% extends 'base.html' %}

{% block title %}Edit Laporan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item"><a href="/reports/">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Edit Laporan</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow-sm page-card">
            <div class="card-header bg-warning text-dark">
                <h3 class="mb-0">Edit Laporan</h3>
            </div>
            <div class="card-body">
                <form method="post" id="editReportForm">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="{{ form.title.id_for_label }}" class="form-label">Judul</label>
                        {{ form.title }}
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.category.id_for_label }}" class="form-label">Kategori</label>
                        {{ form.category }}
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.location.id_for_label }}" class="form-label">Lokasi</label>
                        {{ form.location }}
                    </div>

                    <div class="mb-3">
                        <label for="{{ form.description.id_for_label }}" class="form-label">Deskripsi</label>
                        {{ form.description }}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" id="updateBtn" class="btn btn-warning text-dark d-inline-flex align-items-center">
                            <span class="btn-text">Update</span>
                            <span class="spinner-border spinner-border-sm ms-2 d-none" id="updateSpinner" role="status" aria-hidden="true"></span>
                        </button>
                        <a href="/reports/" class="btn btn-secondary">Kembali</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('editReportForm').addEventListener('submit', function(event) {
    event.preventDefault();

    const form = this;
    const btn = document.getElementById('updateBtn');
    const text = btn.querySelector('.btn-text');
    const spinner = document.getElementById('updateSpinner');

    btn.disabled = true;
    text.textContent = 'Loading...';
    spinner.classList.remove('d-none');

    setTimeout(() => {
        form.submit();
    }, 500);
});
</script>
{% endblock %}
